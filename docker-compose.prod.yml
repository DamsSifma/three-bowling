services:
  # ---- Frontend (nginx) ----
  app:
    image: ghcr.io/${IMAGE_NAME}:latest
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped

  # ---- Backend API ----
  api:
    image: ghcr.io/${IMAGE_NAME}-api:latest
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: bowling
      DB_USER: bowling
      DB_PASSWORD: bowling
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # ---- PostgreSQL ----
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bowling
      POSTGRES_USER: bowling
      POSTGRES_PASSWORD: bowling
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bowling"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---- pgAdmin ----
  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@bowling.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_LISTEN_PORT: 5050
    ports:
      - "5050:5050"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - db
    restart: unless-stopped

volumes:
  pgdata:
  pgadmin_data:
